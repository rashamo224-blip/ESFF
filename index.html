<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESFF — Equivator Saudi Fintech Fund | SVC Meeting</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:    #050F12;
      --bg-dark:    #071B20;
      --bg-card:    #0D2A30;
      --bg-card2:   #0F3038;
      --teal:       #2ECFC0;
      --teal-light: #5EEAE0;
      --teal-dim:   rgba(46,207,192,0.15);
      --teal-border:rgba(46,207,192,0.25);
      --white:      #FFFFFF;
      --text-muted: #8AABB0;
      --text-body:  #C8DDE0;
      --gold:       #E8C97A;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: rgba(5,15,18,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--teal-border);
    }
    .nav-logo img {
      height: 32px;
      width: auto;
      display: block;
    }
    .nav-logo img[alt="Apex"] { display: none; }
    .nav-logo::after {
      content: '';
      display: block;
      width: 116px;
      height: 32px;
      background: url("https://rashamo224-blip.github.io/ESFF/Apex%20Logo.svg") center / contain no-repeat;
      filter: brightness(0) invert(1);
    }
    .nav-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--teal);
      border: 1px solid var(--teal-border);
      padding: 4px 12px; border-radius: 20px;
    }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .svc-logo-wrap {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; color: var(--text-muted); letter-spacing: 1px;
      text-transform: uppercase;
    }
    .svc-logo-wrap img {
      height: 28px; filter: brightness(0) invert(1) opacity(0.85);
    }
    .svc-logo-wrap img[alt="SVC"] { display: none; }
    .svc-logo-wrap::before {
      content: '';
      display: block;
      width: 84px;
      height: 28px;
      background: url("https://rashamo224-blip.github.io/ESFF/SVC%20logo.webp") center / contain no-repeat;
      filter: brightness(0) invert(1) opacity(0.85);
      flex-shrink: 0;
    }
    .svc-logo-text {
      font-weight: 800; font-size: 18px; letter-spacing: 1px;
      color: var(--white);
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center;
      padding: 120px 40px 80px;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(46,207,192,0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 20% 80%, rgba(46,207,192,0.04) 0%, transparent 60%),
                  var(--bg-deep);
    }
