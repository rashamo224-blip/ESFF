<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>ESFF — Equivator Saudi FinTech Fund</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#050F12;
  color:#fff;
}

nav {

  justify-content:space-between;

  border-bottom:1px solid rgba(46,207,192,0.2);
}

.logo {
  font-family:'Playfair Display', serif;
  font-weight:700;
  font-size:20px;
}

.logo span { color:#2ECFC0; }

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;

.hero h1 {

.hero p {

  <div class="buttons">
